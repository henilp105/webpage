# Github action to cleanup a PR preview
# Runs on dispatch or weekly schedule and deletes closed PR previews that are older than 7 days
#

name: PR Preview Cleanup

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: List PR previews
        id: pr-no
        run: |
          pr_folders=($(ls -d pr/*))
          echo "::set-output name=pr_folders::${pr_folders[*]}"
          
      - name: Iterate and Check PRs
        id: iterate-prs
        run: |
          for pr_folder in ${{ steps.pr-no.outputs.pr_folders }}; do
            pr_number=$(basename $pr_folder)
            pr_status=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -X GET "https://api.github.com/repos/${{ github.repository }}/pulls/$pr_number" \
              | jq -r '.state')
            if [ "$pr_status" != "open" ]; then
              rm -rf "$pr_folder"
              echo "Removed folder $pr_folder for closed PR $pr_number"
            fi
          done
      
      - name: Commit and push to gh-pages
        uses: EndBug/add-and-commit@v9.1.3
        with:
          committer_email: 53436240+fortran-lang@users.noreply.github.com
          committer_name: Fortran
          message: "Sphinx build cleanup pr/${{github.event.issue.number}}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
